name: Android CI CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Test and Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Give Gradle execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: ./gradlew clean assembleDebug --no-daemon

      - name: Prepare APK and build information
        shell: bash
        run: |
          mkdir -p release

          cp app/build/outputs/apk/debug/app-debug.apk \
             release/android-task2-debug.apk

          VERSION_CODE=$(sed -nE 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\1/p' app/build.gradle.kts | head -n 1)

          VERSION_NAME=$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle.kts | head -n 1)

          echo "Application: Android Task 2" > release/build-info.txt
          echo "Test Status: Unit tests passed" >> release/build-info.txt
          echo "APK: android-task2-debug.apk" >> release/build-info.txt
          echo "Version Name: ${VERSION_NAME:-unknown}" >> release/build-info.txt
          echo "Version Code: ${VERSION_CODE:-unknown}" >> release/build-info.txt
          echo "Commit: $GITHUB_SHA" >> release/build-info.txt
          echo "Branch: $GITHUB_REF_NAME" >> release/build-info.txt
          echo "Workflow Run: $GITHUB_RUN_NUMBER" >> release/build-info.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-task2-apk
          path: release/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy APK to Fake Server
    needs: build
    runs-on: self-hosted

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-task2-apk
          path: downloaded-apk

      - name: Deploy APK
        shell: powershell
        run: |
          $destination = "D:\fake-server\task2-apk"

          New-Item -ItemType Directory `
            -Force `
            -Path $destination | Out-Null

          Copy-Item `
            "downloaded-apk\android-task2-debug.apk" `
            "$destination\android-task2-debug.apk" `
            -Force

          Copy-Item `
            "downloaded-apk\build-info.txt" `
            "$destination\deployment-info.txt" `
            -Force

          Add-Content `
            "$destination\deployment-info.txt" `
            "Deployment Time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"

          Add-Content `
            "$destination\deployment-info.txt" `
            "Deployment Location: $destination"

          Write-Host "APK deployed successfully to $destination"

          Get-ChildItem $destination

          Write-Host "Deployment information:"
          Get-Content "$destination\deployment-info.txt"